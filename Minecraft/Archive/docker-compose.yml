services:
  minecraft:
    image: mjanders6/minecraft:latest # cant be a local image
    environment:
      - EULA=TRUE
      - PUID=1000
      - PGID=1000
      - RCON_PASSWORD=${RCON_PASSWORD}
      - GAME_MODE=${GAME_MODE}
      - SERVER_IP=${SERVER_IP}
    ports:
      - "25565:25565"
    user: "minecraft:minecraft"
    volumes:
      - minecraft_server:/opt/minecraft
      #- ./server.jar:/opt/minecraft/server/server.jar:ro # Not needed if generating the downloading the JAR file from the website. 
volumes:
  minecraft_server:
    external: true
