version: '3.8'

services:
  portainer:
    image: portainer/portainer-ce:latest
    command: -H tcp://tasks.portainer_agent:9001 --tlsskipverify
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - portainer-net
    environment:
      - AGENT_SECRET_FILE=/run/secrets/agent_secret
    secrets:
      - agent_secret
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:9443/api/system/status", "-k"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  portainer_agent:
    image: portainer/agent:latest
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer_agent
      AGENT_PORT: 9001
      AGENT_SECRET_FILE: /run/secrets/agent_secret
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host
    deploy:
      mode: global
      update_config:
        parallelism: 1
        delay: 10s
    networks:
      - portainer-net
    secrets:
      - agent_secret

volumes:
  portainer_data:
    driver: local

networks:
  portainer-net:
    driver: overlay
    driver_opts:
      com.docker.network.driver.overlay.vxlanid: 4096

secrets:
  agent_secret:
    external: true