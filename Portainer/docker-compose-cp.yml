version: '3.8'
## this version is having a hard time running. Switching to running Porttainer and the Agents seperately. 
services:
  portainer:
    image: portainer/portainer-ce:latest
    command: -H tcp://tasks.portainer_agent:9001 --tlsskipverify
    ports:
      - "8000:8000"
      - "9000:9000"
      - "9443:9443"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - portainer-net
    environment:
      - AGENT_SECRET_FILE=/run/secrets/agent_secret
      - ADMIN_PASSWORD_FILE=/run/secrets/admin_password
    secrets:
      - agent_secret
      - admin_password

  portainer_agent:
    image: portainer/agent:latest
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer_agent
      AGENT_PORT: 9001
      AGENT_SECRET_FILE: /run/secrets/agent_secret
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host
    deploy:
      mode: global
      update_config:
        parallelism: 1
        delay: 10s
    networks:
      - portainer-net
    secrets:
      - agent_secret

volumes:
  portainer_data:
    external: true

networks:
  portainer-net:
    driver: overlay

secrets:
  agent_secret:
    external: true
  admin_password:
    external: true