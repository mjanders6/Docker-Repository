services:
  portainer:
    image: portainer/portainer-ce:latest
    command: -H tcp://tasks.portainer_agent:9001 --tlsskipverify
    ports:
      - "9000:9000"
      - "9443:9443"
      #- "8000:8000"
    volumes:
      - portainer_data:/data
    # REMOVED: /var/run/docker.sock (Server doesn't need it when using Agent)
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - portainer-net
    #environment:
      #- AGENT_SECRET_FILE=/run/secrets/agent_secret
      #- ADMIN_PASSWORD_FILE=/run/secrets/admin_password
    #secrets:
      #- agent_secret
      %- admin_password

  portainer_agent:
    image: portainer/agent:latest
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer_agent
      AGENT_PORT: 9001
      #AGENT_SECRET_FILE: /run/secrets/agent_secret
    # REMOVED: ports 9001 (Internal overlay handles this)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host
    deploy:
      mode: global
    networks:
      - portainer-net
    #secrets:
    #  - agent_secret

volumes:
  portainer_data:
    name: portainer_data #external: true

networks:
  portainer-net:
    driver: overlay

#secrets:
#  agent_secret:
#    external: true
#  admin_password:
#    external: true
