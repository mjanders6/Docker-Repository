version: "3.9"

services:
  dockhand:
    image: fnsys/dockhand:latest
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: ingress
      - target: 9443
        published: 9443
        protocol: tcp
        mode: ingress
    networks:
      - dockhand_net
    environment:
      LOG_LEVEL: info
      DOCKHAND_ENVIRONMENTS: swarm
      DOCKHAND_ENV_swarm_NAME: "Docker Swarm Cluster"
      DOCKHAND_ENV_swarm_DESCRIPTION: "Environment for all Hawser agents running in the Docker Swarm"
      DOCKHAND_ENV_swarm_DISCOVERY: "hawser"
      DOCKHAND_ENV_swarm_DEFAULT: "true"
      DOCKHAND_AGENT_TOKEN_FILE: /run/secrets/dockhand_agent_token
    volumes:
      - dockhand_data:/data
    secrets:
      - dockhand_agent_token
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  hawser-agent:
    image: fnsys/hawser:latest
    networks:
      - dockhand_net
    environment:
      DOCKHAND_SERVER: https://dockhand:9443
      DOCKHAND_ENVIRONMENT: swarm
      DOCKHAND_AGENT_TOKEN_FILE: /run/secrets/dockhand_agent_token
      AGENT_MODE: swarm
      NODE_ID: "{{.Node.ID}}"
      NODE_HOSTNAME: "{{.Node.Hostname}}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
      - dockhand_agent_token
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

networks:
  dockhand_net:
    driver: overlay
    attachable: true

volumes:
  dockhand_data:
    driver: local

secrets:
  dockhand_agent_token:
    external: true