# Docker Swarm stack for Dockhand and Hawser Agents
# Deploy using:
#   docker stack deploy -c docker-compose.yml dockhand

services:
  dockhand:
    image: fnsys/dockhand:latest
    ports:
      - "3000:3000" #"8080:8080"
    networks:
      - dockhand_net
    environment:
      LOG_LEVEL: info
      # Define the environment for Hawser agents
      DOCKHAND_ENVIRONMENTS: swarm
      DOCKHAND_ENV_swarm_NAME: "Docker Swarm Cluster"
      DOCKHAND_ENV_swarm_DESCRIPTION: "Environment for all Hawser agents running in the Docker Swarm"
      DOCKHAND_ENV_swarm_DISCOVERY: "hawser"
      DOCKHAND_ENV_swarm_DEFAULT: "true"
      # Read agent token from Docker secret
      DOCKHAND_AGENT_TOKEN_FILE: /run/secrets/dockhand_agent_token
    volumes:
      - dockhand_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
      - dockhand_agent_token
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  hawser-agent:
    image: ghcr.io/finsys/hawser:latest
    networks:
      - dockhand_net
    environment:
      DOCKHAND_SERVER: http://dockhand:3000
      DOCKHAND_ENVIRONMENT: swarm
      DOCKHAND_AGENT_TOKEN_FILE: /run/secrets/dockhand_agent_token
      AGENT_MODE: swarm
      NODE_ID: "{{.Node.ID}}"
      NODE_HOSTNAME: "{{.Node.Hostname}}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
      - dockhand_agent_token
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

networks:
  dockhand_net:
    driver: overlay
    attachable: true

volumes:
  dockhand_data:
    driver: local

secrets:
  dockhand_agent_token:
    external: true