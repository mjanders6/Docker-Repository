version: "3.9"

services:
  dockhand:
    image: fnsys/dockhand:latest
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
    networks:
      - dockhand_net
    environment:
      LOG_LEVEL: info
      DOCKHAND_ENVIRONMENTS: swarm
      DOCKHAND_ENV_swarm_NAME: "Docker Swarm Cluster"
      DOCKHAND_ENV_swarm_DESCRIPTION: "Environment for all Hawser agents running in the Docker Swarm"
      DOCKHAND_ENV_swarm_DISCOVERY: "hawser"
      DOCKHAND_ENV_swarm_DEFAULT: "true"
      DOCKHAND_AGENT_TOKEN_FILE: /run/secrets/dockhand_agent_token
    volumes:
      - dockhand_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
      - dockhand_agent_token
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.dockhand == true
      restart_policy:
        condition: on-failure

  hawser-agent:
    image: ghcr.io/finsys/hawser:latest
    networks:
      - dockhand_net
    environment:
      DOCKHAND_SERVER: http://dockhand:3000
      DOCKHAND_ENVIRONMENT: swarm
      DOCKHAND_AGENT_TOKEN_FILE: /run/secrets/dockhand_agent_token
      AGENT_MODE: swarm
      NODE_ID: "{{.Node.ID}}"
      NODE_HOSTNAME: "{{.Node.Hostname}}"
      NODE_IP: "{{.Node.Address}}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
      - dockhand_agent_token
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

networks:
  dockhand_net:
    driver: overlay
    attachable: true

volumes:
  dockhand_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/dockhand/data

secrets:
  dockhand_agent_token:
    external: true